<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HANC SIGNAL</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

  <div class="noise"></div>

  <main class="container">

    <img src="assets/hanc.png" class="hanc" />

    <div class="terminal">
      <p id="terminal-text">
        SIGNAL DETECTED
      </p>
    </div>

    <div class="signal-level">
      SIGNAL: <span id="signal-count">0</span>
    </div>

    <button id="scan-button">
      SCAN SIGNAL
    </button>

  </main>

  <script src="telegram.js"></script>
  <script src="app.js"></script>

</body>
</html>
